<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High & Low 完全神完成版 v4</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:linear-gradient(160deg,#0b1020,#050815);
color:white;
text-align:center;
}

h1{
margin:20px 0;
}

button{
padding:12px 18px;
margin:6px;
border-radius:12px;
border:none;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

input{
padding:10px;
border-radius:10px;
border:none;
margin:6px;
}

.card{
font-size:60px;
margin:20px;
}

.menu{
padding:20px;
}

.hidden{
display:none;
}

.panel{
background:#111827;
margin:10px auto;
padding:20px;
border-radius:15px;
width:90%;
max-width:500px;
}

</style>
</head>

<body>

<div id="menu" class="menu">

<h1>High & Low</h1>

<div class="panel">

<input id="name" placeholder="名前">

<br>

<button onclick="solo()">1人プレイ</button>

<button onclick="local()">ローカル対戦</button>

</div>

<div class="panel">

<h3>オンライン対戦</h3>

<input id="room" placeholder="合言葉">

<br>

<button onclick="createRoom()">部屋作成</button>

<button onclick="joinRoom()">参加</button>

<button onclick="startOnline()">開始</button>

</div>

<div class="panel">

<h3>ランキング</h3>

<div id="rank"></div>

</div>

</div>


<div id="game" class="hidden">

<h2 id="status"></h2>

<div class="card" id="parent">?</div>

<button onclick="guess('HIGH')">HIGH</button>
<button onclick="guess('LOW')">LOW</button>

<div class="card" id="child">?</div>

<br>

<button onclick="menu()">メニュー</button>

</div>



<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
signInAnonymously
} from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
updateDoc,
getDoc,
onSnapshot,
collection,
query,
orderBy,
limit,
getDocs,
runTransaction
} from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";



const firebaseConfig = {
apiKey: "AIzaSyBknNpxsXKOJN-YslrjibK9SEFtC88C11I",
authDomain: "fir-config-cddf9.firebaseapp.com",
projectId: "fir-config-cddf9",
storageBucket: "fir-config-cddf9.firebasestorage.app",
messagingSenderId: "516225911038",
appId: "1:516225911038:web:13b722d6623bce1002bdaf"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

await signInAnonymously(auth);



let deck=[]
let parentCard
let childCard

let score=0

let roomId=null

let isHost=false



function newDeck(){

deck=[]

for(let s of ["♠","♥","♦","♣"])
for(let i=2;i<=14;i++)
deck.push({v:i,s})

deck.sort(()=>Math.random()-0.5)

}



function card(c){

let r=c.v

if(r==11)r="J"
if(r==12)r="Q"
if(r==13)r="K"
if(r==14)r="A"

return r+c.s

}



function draw(){

parentCard=deck.pop()

childCard=deck.pop()

document.getElementById("parent").innerText=card(parentCard)

document.getElementById("child").innerText="?"

}



window.guess=function(g){

document.getElementById("child").innerText=card(childCard)

let result

if(childCard.v>parentCard.v)result="HIGH"
else if(childCard.v<parentCard.v)result="LOW"
else result="DRAW"

if(result==g){

score++

alert("当たり！")

}else if(result=="DRAW"){

alert("引き分け")

}else{

alert("ハズレ")

}

draw()

}



window.solo=function(){

document.getElementById("menu").classList.add("hidden")

document.getElementById("game").classList.remove("hidden")

newDeck()

draw()

}



window.local=solo



window.menu=function(){

document.getElementById("game").classList.add("hidden")

document.getElementById("menu").classList.remove("hidden")

}



window.createRoom=async function(){

roomId=document.getElementById("room").value

await setDoc(doc(db,"rooms",roomId),{

state:"waiting"

})

isHost=true

alert("部屋作成")

listenRoom()

}



window.joinRoom=async function(){

roomId=document.getElementById("room").value

await updateDoc(doc(db,"rooms",roomId),{

state:"ready"

})

isHost=false

alert("参加")

listenRoom()

}



window.startOnline=async function(){

if(!isHost){

alert("ホストだけ開始できます")

return

}

await updateDoc(doc(db,"rooms",roomId),{

state:"start"

})

}



function listenRoom(){

onSnapshot(doc(db,"rooms",roomId),(docu)=>{

const data=docu.data()

if(data.state=="start"){

solo()

}

})

}



async function loadRanking(){

const q=query(collection(db,"profiles"),orderBy("rating","desc"),limit(10))

const qs=await getDocs(q)

let html=""

qs.forEach(d=>{

html+=d.data().name+" : "+d.data().rating+"<br>"

})

document.getElementById("rank").innerHTML=html

}



loadRanking()



</script>


</body>
</html>
