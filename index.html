<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>High & Low Online</title>

<style>
body{
font-family:sans-serif;
background:#0b1220;
color:white;
text-align:center;
margin:0;
}

button{
padding:10px 20px;
margin:5px;
border-radius:10px;
border:none;
background:#2563eb;
color:white;
font-size:16px;
}

.card{
font-size:60px;
margin:20px;
}

.menu{padding:20px}
.hidden{display:none}
</style>
</head>

<body>

<div id="menu" class="menu">

<h1>High & Low</h1>

<input id="name" placeholder="名前">

<br><br>

<button onclick="solo()">1人プレイ</button>

<button onclick="local()">ローカル2人</button>

<br><br>

<input id="room" placeholder="合言葉">

<button onclick="createRoom()">部屋作成</button>

<button onclick="joinRoom()">参加</button>

</div>

<div id="game" class="hidden">

<h2 id="status"></h2>

<div class="card" id="parent">?</div>

<button onclick="guess('HIGH')">HIGH</button>
<button onclick="guess('LOW')">LOW</button>

<div class="card" id="child">?</div>

<br>

<button onclick="menu()">メニュー</button>

</div>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
signInAnonymously
} from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
updateDoc,
onSnapshot,
getDoc,
collection,
query,
orderBy,
limit,
getDocs
} from
"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"ここ",
authDomain:"ここ",
projectId:"ここ",
storageBucket:"ここ",
messagingSenderId:"ここ",
appId:"ここ"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

await signInAnonymously(auth);

let deck=[]
let parentCard
let childCard

function newDeck(){

deck=[]

for(let s of ["♠","♥","♦","♣"])
for(let i=2;i<=14;i++)
deck.push({v:i,s})

deck.sort(()=>Math.random()-0.5)

}

function draw(){

parentCard=deck.pop()
childCard=deck.pop()

document.getElementById("parent").innerText=card(parentCard)
document.getElementById("child").innerText="?"

}

function card(c){

let r=c.v
if(r==11)r="J"
if(r==12)r="Q"
if(r==13)r="K"
if(r==14)r="A"

return r+c.s

}

window.guess=function(g){

document.getElementById("child").innerText=card(childCard)

let result

if(childCard.v>parentCard.v)result="HIGH"
else if(childCard.v<parentCard.v)result="LOW"
else result="DRAW"

setTimeout(()=>{

draw()

},1000)

}

window.solo=function(){

document.getElementById("menu").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

newDeck()
draw()

}

window.local=solo

let roomId

window.createRoom=async function(){

roomId=document.getElementById("room").value

await setDoc(doc(db,"rooms",roomId),{
state:"waiting"
})

alert("部屋作成")

}

window.joinRoom=async function(){

roomId=document.getElementById("room").value

await updateDoc(doc(db,"rooms",roomId),{
state:"ready"
})

alert("参加")

}

window.menu=function(){

document.getElementById("game").classList.add("hidden")
document.getElementById("menu").classList.remove("hidden")

}

</script>

</body>
</html>
